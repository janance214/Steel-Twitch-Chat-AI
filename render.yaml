services:
  - type: web
    name: steel-twitch-chat-ai-web
    runtime: node
    branch: main
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: TWITCH_USER
        sync: false
      - key: TWITCH_AUTH
        sync: false
      - key: CHANNELS
        value: SteelFlashGaming
      - key: GPT_MODE
        value: CHAT
      - key: HISTORY_LENGTH
        value: "5"
      - key: MODEL_NAME
        value: gpt-4.1-mini
      - key: COMMAND_NAME
        value: steel,!steel
      - key: SEND_USERNAME
        value: "true"
      - key: ENABLE_TTS
        value: "false"
      - key: ENABLE_CHANNEL_POINTS
        value: "false"
      - key: COOLDOWN_DURATION
        value: "10"
